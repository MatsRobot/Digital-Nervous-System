; PlatformIO Project Configuration File
; This file manages the build settings, hardware targets, and dependencies for the Node 0x123 (ESP32-S3).

[env:esp32-s3-devkitc-1]
; --- CORE HARDWARE SETTINGS ---
; Specifies the development platform (Espressif 32 is the family for all ESP32 chips)
platform = espressif32
; Specifies the exact development board being used (ESP32-S3 DevKitC-1)
board = esp32-s3-devkitc-1
; Specifies the coding framework (using standard Arduino library functions)
framework = arduino
; Sets the speed (baud rate) for the Serial Monitor to match the code (115200)
monitor_speed = 115200

; --- USB SERIAL CONFIGURATION ---
; These flags are CRITICAL for the ESP32-S3 to output data via its native USB port
build_flags = 
    ; Configures the chip to use its internal USB controller for communication
    -D ARDUINO_USB_MODE=1
    ; Ensures the Serial port is active and ready as soon as the chip boots up
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- LIBRARY DEPENDENCIES ---
; PlatformIO will automatically download these specific versions when you build the project.
lib_deps = 
    ; adafruit/Adafruit SSD1306:
    ; The primary driver for the 128x64 I2C OLED display used to show node status.
    adafruit/Adafruit SSD1306 @ ^2.5.13

    ; adafruit/Adafruit GFX Library:
    ; A core graphics library that provides functions for drawing text and shapes on the OLED.
    adafruit/Adafruit GFX Library @ ^1.11.11

    ; pololu/VL53L0X:
    ; The driver for the Time-of-Flight laser sensor (if local distance monitoring is used).
    pololu/VL53L0X @ ^1.3.1

    ; handmade0octopus/ESP32-TWAI-CAN:
    ; A high-level library that simplifies using the ESP32's built-in CAN-Bus controller (TWAI).
    handmade0octopus/ESP32-TWAI-CAN @ ^1.0.1