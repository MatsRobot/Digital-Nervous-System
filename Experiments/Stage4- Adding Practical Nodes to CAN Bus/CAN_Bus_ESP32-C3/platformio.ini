; PlatformIO Project Configuration File
; This file manages the build settings, hardware targets, and dependencies for Node 0x124 (ESP32-C3).

[env:esp32-c3-devkitm-1]
; --- CORE HARDWARE SETTINGS ---
; Specifies the development platform (Espressif 32 is the family for ESP32 chips)
platform = espressif32
; Specifies the exact development board being used
board = esp32-c3-devkitm-1
; Specifies the coding framework (using the standard Arduino library functions)
framework = arduino

; --- MONITOR & DEBUG SETTINGS ---
; Sets the speed (baud rate) for the Serial Monitor to match the code (115200)
monitor_speed = 115200

; --- BUILD CONFIGURATION ---
build_flags = 
    ; Configures the ESP32-C3 to use its built-in USB Serial for output
    -D ARDUINO_USB_MODE=1
    ; Ensures the Serial port is active immediately upon the chip booting up
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- LIBRARY DEPENDENCIES ---
; PlatformIO will automatically download these libraries from the registry during the build process.
lib_deps =
    ; madhephaestus/ESP32Servo:
    ; A specialized library for ESP32 hardware PWM to control the scanning servo motor.
    madhephaestus/ESP32Servo @ ^3.0.6

    ; pololu/VL53L0X:
    ; The driver for the Time-of-Flight (Laser) distance sensor.
    pololu/VL53L0X @ ^1.3.1

    ; greiman/SSD1306Ascii:
    ; A lightweight, text-only library used to drive the I2C OLED display efficiently.
    greiman/SSD1306Ascii @ ^1.3.5

; --- ADVANCED SETTINGS ---
; "Deep+" mode forces the compiler to scan all libraries for nested headers,
; ensuring all sensor and CAN drivers are found correctly.
lib_ldf_mode = deep+