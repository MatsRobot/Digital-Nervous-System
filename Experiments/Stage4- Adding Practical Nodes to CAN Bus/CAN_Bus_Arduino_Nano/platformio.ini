; PlatformIO Project Configuration File
; This file manages the build settings, hardware targets, and dependencies for the Node 0x111 (Arduino Nano).

[env:nanoatmega328]
; --- CORE SETTINGS ---
; Specifies the development platform (Atmel AVR is the family for standard Arduinos)
platform = atmelavr
; Specifies the exact physical board (Arduino Nano with the ATmega328P chip)
board = nanoatmega328
; Specifies the coding framework (using the standard Arduino library functions)
framework = arduino

; --- MONITOR SETTINGS ---
; Sets the speed (baud rate) for the Serial Monitor in the terminal to match the code (115200)
monitor_speed = 115200

; --- LIBRARY DEPENDENCIES ---
; PlatformIO will automatically download these libraries from the registry when you build.
lib_deps =
    ; sandeepmistry/CAN:
    ; This provides the drivers for the MCP2515 CAN bus controller shield.
    ; It handles the SPI communication between the Nano and the CAN hardware.
    sandeepmistry/CAN @ ^0.3.1

    ; marcoschwartz/LiquidCrystal_I2C:
    ; This allows the Nano to talk to the 20x4 LCD screen using only two wires (I2C).
    ; It handles the initialization and character printing for the display.
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

    ; featherfly/SoftwareSerial:
    ; This allows us to turn digital pins 3 and 4 into a "virtual" Serial port.
    ; It is used specifically to read data from the MaxSonar sensor without using the main Serial pins.
    featherfly/SoftwareSerial @ ^1.0