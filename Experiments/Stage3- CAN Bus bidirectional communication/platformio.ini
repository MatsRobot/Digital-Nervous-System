; =================================================================
; PROJECT CONFIGURATION: HARDWARE & COMPILER SETTINGS
; This section defines the environment, board type, and USB behavior.
; =================================================================

; Define the build environment for the ESP32-S3 DevKit
[env:esp32-s3-devkitc-1]
; Specifies the development platform (Espressif 32-bit ecosystem)
platform = espressif32
; Sets the specific board model to ensure correct pin mapping
board = esp32-s3-devkitc-1
; Tells the compiler to use the Arduino abstraction layer/framework
framework = arduino

; -----------------------------------------------------------------
; PROCESSOR CONFIGURATION
; Forces the hardware to operate at its standard rated specifications.
; -----------------------------------------------------------------
; Explicitly identifies the Microcontroller Unit as an ESP32-S3
board_build.mcu = esp32s3
; Sets the CPU frequency to 240MHz (240,000,000 Hertz)
board_build.f_cpu = 240000000L

; -----------------------------------------------------------------
; MONITOR & USB COMMUNICATION FLAGS
; Essential for N16P8 modules to ensure the Serial Monitor works over USB.
; -----------------------------------------------------------------
; Sets the data rate for the Serial Monitor to 115,200 bits per second
monitor_speed = 115200

; Compiler flags to redirect Serial output to the internal USB-CDC port
build_flags = 
    ; Enables the internal USB peripheral mode
    -D ARDUINO_USB_MODE=1
    ; Forcing the USB Serial (CDC) to initialize immediately on boot
    -D ARDUINO_USB_CDC_ON_BOOT=1