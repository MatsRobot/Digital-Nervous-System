; --- PlatformIO Project Configuration File ---
; Lines starting with a semicolon (;) are comments and are ignored by the computer.

[env:esp32-s3-devkitc-1]
# This defines the specific "Environment" for your project. 
# It tells the system you are using the ESP32-S3 DevKitC-1 board.

platform = espressif32
# Specifies the software platform. 'espressif32' is the framework required 
# to compile code for all ESP32 series chips.

board = esp32-s3-devkitc-1
# Tells the compiler the exact pin layout and memory size of your 
# specific S3 developer board.

framework = arduino
# This tells PlatformIO to use the 'Arduino' style of coding (using setup and loop) 
# rather than professional Espressif IoT Development Framework (ESP-IDF).

monitor_speed = 115200
# Sets the speed (baud rate) for the Serial Monitor window on your laptop. 
# 115200 is the standard high-speed setting for ESP32.

; --- USB CONFIGURATION FLAGS ---
build_flags = 
    -D ARDUINO_USB_MODE=1
    # Enables the "Internal" USB mode of the S3 chip so it can act as a serial device.
    
    -D ARDUINO_USB_CDC_ON_BOOT=1
    # This ensures that the Serial port (CDC) starts as soon as the chip boots up. 
    # Without this, you might not see the first few "Internal" messages from the robot.

; --- LIBRARY DEPENDENCIES ---
# This is the most important section. PlatformIO reads these names and 
# automatically downloads the code for these libraries from the internet.
lib_deps = 
    adafruit/Adafruit SSD1306 @ ^2.5.13
    # The driver for your 128x64 OLED screen. It handles the "drawing" logic.
    
    adafruit/Adafruit GFX Library @ ^1.11.11
    # A "Core" graphics library. The SSD1306 library (above) needs this to 
    # actually create fonts and shapes.
    
    pololu/VL53L0X @ ^1.3.1
    # The library for the Laser Distance Sensor (Time-of-Flight).
    
    handmade0octopus/ESP32-TWAI-CAN @ ^1.0.1
    # The specific driver that allows the ESP32-S3 to use its built-in 
    # "Two-Wire Automotive Interface" (TWAI), which is the ESP32's version of CAN-Bus.