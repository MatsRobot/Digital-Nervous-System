; =================================================================
; STAGE 2 CONFIGURATION: ADDING PERIPHERAL LIBRARIES
; =================================================================

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; USB CDC flags ensure serial output works via the S3's native USB port
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; -----------------------------------------------------------------
; LIBRARY DEPENDENCIES
; These are downloaded automatically by PlatformIO.
; -----------------------------------------------------------------
lib_deps = 
    ; Library for the OLED display hardware driver
    adafruit/Adafruit SSD1306 @ ^2.5.13
    ; Core graphics library (drawing lines, text, shapes)
    adafruit/Adafruit GFX Library @ ^1.11.11
    ; Time-of-Flight (ToF) distance sensor library
    pololu/VL53L0X @ ^1.3.1